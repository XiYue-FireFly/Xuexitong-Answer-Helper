name: Build Windows Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build installer
        shell: pwsh
        run: |
          npm run release:win

      - name: Publish GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          allowUpdates: true
          replacesArtifacts: true
          makeLatest: true
          artifactErrorsFailBuild: true
          artifacts: release/Xuexitong-Answer-Helper-*-win-x64-setup.exe
          body: |
            ## New Features

            - 新增 API 搜题并发数控制，支持 1 到 5 路并发
            - 自动化填入会按配置并发查询题目，答案返回后继续自动填入
            - 新增接口限流保护，遇到 429 后下次自动降低并发数
            - 自动化面板新增并发提示，说明默认 1 路最稳、额度足够时可调高

            ## Fixes

            - 修复“并发查询”实际只使用 1 个 worker 的问题
            - 修复题目列表卡片文字高度不足导致题干、题号和状态互相重叠的问题
            - 修复题目列表滚动区域过矮、右侧滚动条贴近内容导致观感拥挤的问题

            ## Performance Improvements

            - 优化多题 API 搜题速度，可在稳定性和速度之间手动选择并发数
            - 优化题目列表布局，卡片固定最小高度并限制题干两行显示
            - 优化状态标签显示，避免“已解析/题库/未解析”挤压题干文本

            ## Download

            Windows 用户下载下方 `Xuexitong-Answer-Helper-${{ github.ref_name }}-win-x64-setup.exe` 安装即可。
