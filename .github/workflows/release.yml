name: Build Windows Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build installer
        shell: pwsh
        run: |
          npm run release:win

      - name: Publish GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          allowUpdates: true
          replacesArtifacts: true
          makeLatest: true
          artifactErrorsFailBuild: true
          artifacts: release/Xuexitong-Answer-Helper-*-win-x64-setup.exe
          body: |
            ## New Features

            - 设置页 API Key 输入框新增“没有秘钥，前往”入口
            - 新增 API Key 获取弹窗，当前服务商会优先展示
            - 新增常用 AI 服务商获取地址列表，支持打开控制台和复制链接
            - 新增 API Key 使用教程，说明云端服务和本地模型的配置差异
            - 新增本地模型无需 API Key 的提示，覆盖 Ollama、LM Studio、vLLM/LocalAI

            ## Fixes

            - 修复用户没有 API Key 时需要手动查找服务商文档的问题
            - 修复 API Key 获取地址缺少复制入口的问题
            - 修复设置页帮助信息不足导致 AI 配置流程不清晰的问题

            ## Performance Improvements

            - 优化设置页 API 配置路径，减少用户在不同网站之间来回搜索的时间
            - 优化弹窗展示顺序，当前服务商排在首位，其他服务商作为备选列表展示

            ## Download

            Windows 用户下载下方 `Xuexitong-Answer-Helper-${{ github.ref_name }}-win-x64-setup.exe` 安装即可。
