name: Build Windows Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build installer
        shell: pwsh
        run: |
          npm run release:win

      - name: Publish GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          allowUpdates: true
          replacesArtifacts: true
          makeLatest: true
          artifactErrorsFailBuild: true
          artifacts: release/Xuexitong-Answer-Helper-*-win-x64-setup.exe
          body: |
            ## 更新内容

            - 修复普通 AI 服务商选择“自定义 Base URL / 自定义模型”后输入框无法保持的问题。
            - 修复普通 AI 服务商保存自定义 Base URL / 模型后，刷新或重启又恢复默认值的问题。
            - 优化内置浏览器标签页右键菜单，支持刷新、复制标签页地址、关闭标签页、关闭其他标签页、关闭右侧标签页。
            - 标签页右键菜单加入浏览器式分组、快捷键提示、禁用态和边界定位，右键操作更接近正常浏览器。

            ## Download

            Windows 用户下载下方 `Xuexitong-Answer-Helper-${{ github.ref_name }}-win-x64-setup.exe` 安装即可。
