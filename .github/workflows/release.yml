name: Build Windows Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build installer
        shell: pwsh
        run: |
          npm run release:win

      - name: Publish GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          allowUpdates: true
          replacesArtifacts: true
          makeLatest: true
          artifactErrorsFailBuild: true
          artifacts: release/Xuexitong-Answer-Helper-*-win-x64-setup.exe
          body: |
            ## New Features

            - 新增 22 个 AI 服务商预设，覆盖 Qwen、DeepSeek、硅基流动、OpenRouter、Gemini、Kimi、GLM、豆包、混元、千帆、MiniMax、StepFun、Groq、Mistral、Together、Grok、小米 MiMo、OpenAI 等
            - 新增 Ollama、LM Studio、vLLM/LocalAI 本地模型配置，支持无需 API Key 的本地接口
            - 新增 AI 服务商 URL、模型和认证方式下拉选择
            - 新增应用检查更新入口
            - 新增错误报告台，集中展示后台错误报告
            - 新增 Windows 桌面通知，解析或填入完成后提醒用户
            - 新增浏览器标签页右键菜单和中键关闭标签页
            - 新增 WebView 登录态持久化状态展示
            - 新增卸载清理规则，卸载时同步清理应用缓存、本地题库和网页登录态

            ## Fixes

            - 修复 UI 不协调问题，统一深浅主题、面板、按钮、输入框和下拉菜单样式
            - 修复 Windows/Electron 原生下拉白底浅字导致选项不可读的问题
            - 修复更新检查返回非 JSON 时出现 Unexpected token 报错的问题
            - 修复 AI 测试聊天输入框固定、无法自由输入的问题
            - 修复小米 MiMo api-key 认证方式和 response_format 兼容问题
            - 修复本地模型服务因 API Key 为空而误走演示答案的问题
            - 修复源码 UTF-8 BOM 和终端显示引发的中文编码误判
            - 修复安装包启动白屏和旧 release 产物残留相关问题

            ## Performance Improvements

            - 优化设置页 AI 配置流程，减少手动输入 Base URL 和模型名的错误率
            - 优化 AI 请求兼容性，不支持 JSON response_format 的服务商默认使用文本 JSON 解析
            - 优化应用主题切换后的外框、工具栏和浏览器标签栏一致性

            ## Download

            Windows 用户下载下方 `Xuexitong-Answer-Helper-${{ github.ref_name }}-win-x64-setup.exe` 安装即可。
